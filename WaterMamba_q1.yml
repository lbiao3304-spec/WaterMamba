# general settings
name: WaterMamba_q1
model_type: ImageCleanModel
scale: 1
num_gpu: 1 # set num_gpu: 0 for cpu mode
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_PairedImage
    dataroot_gt: /home/right_limit/WaterMamba/dataset/reference-800
    dataroot_lq: /home/right_limit/WaterMamba/dataset/raw-800
    geometric_augs: false
    filename_tmpl: '{}'
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 2
    batch_size_per_gpu: 4

    ### -------------Training on single fixed-patch size 256x256--------------------------
    mini_batch_sizes: [4, 4]
    iters: [50000]
    gt_size: 256
    gt_sizes: [256]
    ### ------------------------------------------------------------

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_PairedImage
    dataroot_gt: /home/right_limit/WaterMamba/dataset/ref_val
    dataroot_lq: /home/right_limit/WaterMamba/dataset/raw_val
    geometric_augs: false
    io_backend:
      type: disk

# network structures
network_g:
  type: WaterMamba
  inp_channels: 3
  out_channels: 3
  dim: 64
  num_blocks: [1, 1, 1, 1]
  mam_blocks: [2, 2, 2, 2]
  d_state: 16
  drop_path: 0
  attn_drop_rate: 0.
  resolution: [256, 256]
  expand: 2
  d_conv: 4
  bias: False

# path
path:
  pretrain_network_g: /home/right_limit/WaterMamba/experiments/WaterMamba/models/net_g_300000.pth
  strict_load_g: false
  resume_state: ~

# training settings
train:
  total_iter: 50000
  warmup_iter: -1
  use_grad_clip: true

  # Single cosine decay: 6e-4 -> 1e-6 over 50k iters
  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [50000]
    restart_weights: [1]
    eta_mins: [0.000001]

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: AdamW
    lr: !!float 6e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 8
  val_freq: !!float 10000
  save_img: true
  rgb2bgr: true
  use_image: true
  max_minibatch: 8

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
